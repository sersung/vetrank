<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary SEO -->
    <title>VetRank — Estudos Gamificados para Veterinária</title>
    <meta name="description" content="Plataforma gamificada de estudos para veterinária. Banco de questões, simulados com timer, ranking e trial grátis de 30 dias." />

    <meta name="author" content="VetRank" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vetrank.manus.space/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vetrank.manus.space/" />
    <meta property="og:title" content="VetRank — Plataforma Gamificada de Estudos para Veterinária" />
    <meta property="og:description" content="Estude veterinária com gamificação, simulados cronometrados e ranking competitivo. Trial premium grátis por 30 dias." />

    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VetRank — Plataforma Gamificada de Estudos para Veterinária" />
    <meta name="twitter:description" content="Estude veterinária com gamificação, simulados cronometrados e ranking competitivo." />
    <meta name="twitter:image" content="https://vetrank.manus.space/og-image.png" />

    <meta name="theme-color" content="#0d1117" />

    <!-- Google Fonts: Playfair Display + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer

      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
